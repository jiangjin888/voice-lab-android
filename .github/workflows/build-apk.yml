name: Build Debug APK

# 触发：推送到 main/master 分支，或在 Actions 页面手动点 Run workflow
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 安装 Android SDK 命令行工具
        uses: android-actions/setup-android@v3

      - name: 安装编译所需的 SDK 组件
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: 下载完整 Vosk 中文模型（避免本机模型文件缺失 uuid）
        run: |
          curl -L -o /tmp/vosk-model-small-cn-0.22.zip https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip
          unzip -q /tmp/vosk-model-small-cn-0.22.zip -d /tmp/
          rm -rf app/src/main/assets/model-zh-cn
          mv /tmp/vosk-model-small-cn-0.22 app/src/main/assets/model-zh-cn

      - name: 下载 Gradle 8.9（无需本地 gradle wrapper）
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: 编译 Debug APK
        run: gradle assembleDebug --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: voicelab-debug-apk
          path: app/build/outputs/apk/debug/*.apk
